[packages]
    # Tools shared across ALL operating systems (CLI only)
    universal = [
        "git-delta",
        "pipx",
        "ripgrep",
        "tmux",
        "zoxide",
    ]

    [packages.darwin]
        # CLI tools (brew install)
        [packages.darwin.brew]
            common = [
                "fd",
                "fnm",
                "fzf",
                "gh",
                "lazygit",
                "neovim",
                "sesh",
                "tlrc",
            ]
            work = []
            personal = []

        # GUI apps (brew install --cask)
        [packages.darwin.cask]
            common = [
                "docker",
                "ghostty",
                "google-chrome",
                "raycast",
                "tailscale-app",
                "visual-studio-code",
                "zoom",
            ]
            work = []
            personal = [
                "firefox",
                "hiddenbar",
                "karabiner-elements",
                "nordvpn",
                "qbittorrent",
                "scroll-reverser",
                "vlc",
            ]

    [packages.linux]
        # apt install
        common = [
            "build-essential",
            "fd-find",
            "git",
            "tldr",
            "unzip",
            "zsh",
        ]
        work = []
        personal = []

    [packages.python]
        common = ["uv"]
