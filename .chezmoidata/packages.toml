[packages]
# Tools shared across ALL operating systems (CLI only)
[packages.universal]
common = ["git-delta", "ripgrep", "tmux", "yq", "zoxide"]
work = []
personal = []

# macOS CLI tools (brew install)
[packages.darwin.brew]
common = ["fd", "fzf", "gh", "lazygit", "neovim", "sesh"]
work = []
personal = ["bitwarden-cli", "gemini-cli", "tlrc", "mise"]

# macOS GUI apps (brew install --cask)
[packages.darwin.cask]
common = ["ghostty", "raycast", "scroll-reverser"]
work = []
personal = [
    "codex",
    "firefox",
    "google-chrome",
    "google-gemini",
    "hiddenbar",
    "karabiner-elements",
    "nordvpn",
    "tailscale-app",
    "visual-studio-code",
    "vlc",
    "zoom",
]

# Linux packages (apt install)
[packages.linux]
common = ["fd-find", "unzip"]
work = []
personal = ["build-essential", "tldr", "zsh"]
