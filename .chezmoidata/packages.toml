[packages]
    # Packages for both macOS (Brew) and Linux (Apt)
    # Note: On Linux, some of these might be installed via other means (externals)
    # but we'll try to use apt for as many as possible.
    common = [
        "ripgrep",
        "tmux",
        "zoxide",
    ]

    # Homebrew-only (common CLI tools not available/preferred via apt on Linux)
    brew_only = [
        "fnm",
        "fzf",
        "gh",
        "git-delta",
        "lazygit",
        "neovim",
        "pipx",
        "sesh",
        "tlrc",
    ]

    # macOS GUI Applications (Casks)
    darwin = [
        "firefox",
        "ghostty",
        "google-chrome",
        "hiddenbar",
        "karabiner-elements",
        "nordvpn",
        "notion",
        "qbittorrent",
        "raycast",
        "scroll-reverser",
        "tailscale-app",
        "visual-studio-code",
        "vlc",
        "zoom",
    ]

    # Linux-specific packages (Apt)
    linux = [
        "unzip",
        "curl",
        "git",
        "build-essential",
        "zsh",
        "ninja-build",
        "gettext",
        "cmake",
        "pipx",
        "tldr", # apt name for tlrc/tldr
    ]

    # Python packages (Pipx)
    python = [
        "uv",
    ]
